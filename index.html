<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>openpage // terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="terminal">
        <div class="terminal-header">
            <div class="header-dots">
                <span class="dot dot-red"></span>
                <span class="dot dot-yellow"></span>
                <span class="dot dot-green"></span>
            </div>
            <div class="header-title">openpage // ai terminal</div>
            <div class="header-status" id="statusIndicator">
                <span class="status-dot"></span>
                <span class="status-text">ready</span>
            </div>
        </div>

        <div class="terminal-body" id="terminalBody">
            <!-- Chat messages render here -->
        </div>

        <div class="terminal-input-area">
            <div class="input-row">
                <span class="prompt-symbol">$</span>
                <input
                    type="text"
                    id="userInput"
                    placeholder="Ask me anything..."
                    autocomplete="off"
                    spellcheck="false"
                    disabled
                />
            </div>
            <div class="input-hint">
                <span>Press <kbd>Enter</kbd> to send</span>
                <span class="input-hint-right">AI-powered by AWS Bedrock</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
